name: Build & Publish Wheels

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*.*.*"
  pull_request:

permissions:
  contents: read

jobs:
  build_wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (manylinux2014)
          - os: ubuntu-22.04
            env:
              CIBW_DEPENDENCY_VERSIONS: "pinned"
              CIBW_BUILD: "cp310-manylinux_x86_64 cp311-manylinux_x86_64 cp312-manylinux_x86_64 cp313-manylinux_x86_64 cp314-manylinux_x86_64"
              CIBW_SKIP: "*-musllinux_*"
              CIBW_BUILD_VERBOSITY: "3"
              CIBW_MANYLINUX_X86_64_IMAGE: "manylinux2014"
              CXXFLAGS: "-w -static-libstdc++ -static-libgcc"
              CFLAGS: "-w"

          # Windows AMD64 only
          - os: windows-2022
            env:
              CIBW_DEPENDENCY_VERSIONS: "pinned"
              CIBW_BUILD: "cp310-win_amd64 cp311-win_amd64 cp312-win_amd64 cp313-win_amd64 cp314-win_amd64"
              CIBW_SKIP: "*-win32"
              CIBW_BUILD_VERBOSITY: "3"
              CIBW_ARCHS_WINDOWS: "AMD64"
              CL: "/W0"

          # macOS Intel (x86_64)
          - os: macos-15-intel
            env:
              CIBW_DEPENDENCY_VERSIONS: "pinned"
              CIBW_BUILD: "cp310-macosx_x86_64 cp311-macosx_x86_64 cp312-macosx_x86_64 cp313-macosx_x86_64 cp314-macosx_x86_64"
              CIBW_BUILD_VERBOSITY: "3"
              CIBW_ENVIRONMENT_MACOS: >-
                MACOSX_DEPLOYMENT_TARGET=10.13
                CMAKE_OSX_DEPLOYMENT_TARGET=10.13
                CMAKE_OSX_ARCHITECTURES=x86_64
                SKBUILD_CMAKE_ARGS="-DCMAKE_OSX_ARCHITECTURES=x86_64;-DCMAKE_OSX_DEPLOYMENT_TARGET=10.13"
              CIBW_REPAIR_WHEEL_COMMAND_MACOS: "delocate-wheel --require-archs x86_64 -w {dest_dir} -v {wheel}"
              CXXFLAGS: "-w"
              CFLAGS: "-w"

          # macOS Apple Silicon (arm64)
          - os: macos-15   # or macos-latest (currently macOS 15)
            env:
              CIBW_DEPENDENCY_VERSIONS: "pinned"
              CIBW_BUILD: "cp310-macosx_arm64 cp311-macosx_arm64 cp312-macosx_arm64 cp313-macosx_arm64 cp314-macosx_arm64"
              CIBW_BUILD_VERBOSITY: "3"
              CIBW_ENVIRONMENT_MACOS: >-
                MACOSX_DEPLOYMENT_TARGET=11.0
                CMAKE_OSX_DEPLOYMENT_TARGET=11.0
                CMAKE_OSX_ARCHITECTURES=arm64
                SKBUILD_CMAKE_ARGS="-DCMAKE_OSX_ARCHITECTURES=arm64;-DCMAKE_OSX_DEPLOYMENT_TARGET=11.0"
              CIBW_REPAIR_WHEEL_COMMAND_MACOS: "delocate-wheel --require-archs arm64 -w {dest_dir} -v {wheel}"
              CXXFLAGS: "-w"
              CFLAGS: "-w"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python (host)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache cibuildwheel
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/cibuildwheel
            ~/Library/Caches/pip
            ~/.cache/cibuildwheel
            ~/.cache/pip
            ~\AppData\Local\pypa\cibuildwheel\Cache
            ~\AppData\Local\pip\Cache
          key: cibw-${{ matrix.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            cibw-${{ matrix.os }}-

      - name: Pre-download virtualenv (with retries)
        shell: bash
        run: |
          VIRTUALENV_VERSION="20.30.0"
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            CACHE_DIR="$HOME/Library/Caches/cibuildwheel"
          elif [[ "$RUNNER_OS" == "Windows" ]]; then
            CACHE_DIR="$LOCALAPPDATA/pypa/cibuildwheel/Cache"
          else
            CACHE_DIR="$HOME/.cache/cibuildwheel"
          fi
          mkdir -p "$CACHE_DIR"
          DEST="$CACHE_DIR/virtualenv-${VIRTUALENV_VERSION}.pyz"
          if [[ -f "$DEST" ]]; then
            echo "virtualenv already cached at $DEST"
            exit 0
          fi
          URL="https://raw.githubusercontent.com/pypa/get-virtualenv/${VIRTUALENV_VERSION}/public/virtualenv.pyz"
          for i in 1 2 3 4 5; do
            echo "Attempt $i: downloading virtualenv.pyz..."
            if curl -fsSL --retry 3 --retry-delay 10 -o "$DEST" "$URL"; then
              echo "Downloaded successfully to $DEST"
              exit 0
            fi
            echo "Download failed, waiting 30 seconds..."
            sleep 30
          done
          echo "Failed to download virtualenv after 5 attempts"
          exit 1

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==2.*

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env: ${{ matrix.env }}

      - name: Store wheels (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  upload_testpypi:
    needs: build_wheels
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Show built wheels
        run: ls -al dist || true

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  upload_pypi:
    needs: build_wheels
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Show built wheels
        run: ls -al dist || true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
